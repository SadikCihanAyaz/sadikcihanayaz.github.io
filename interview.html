<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interview Player | Learning Hub</title>
  <meta id="meta-description" name="description" content="Tek tek sorularla ilerleyen interview pratigi: test sorulari, kod sorulari ve gizli/acik cevap akisi.">
  <meta id="meta-robots" name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1">
  <link id="canonical-link" rel="canonical" href="https://sadikcihanayaz.github.io/interview.html">
  <link rel="sitemap" type="application/xml" title="Sitemap" href="/sitemap.xml">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Learning Hub">
  <meta id="og-title" property="og:title" content="Interview Player | Learning Hub">
  <meta id="og-description" property="og:description" content="Tek tek sorularla interview pratigi.">
  <meta id="og-url" property="og:url" content="https://sadikcihanayaz.github.io/interview.html">
  <meta property="og:image" content="https://sadikcihanayaz.github.io/images/cihan.jpeg">
  <meta name="twitter:card" content="summary_large_image">
  <meta id="twitter-title" name="twitter:title" content="Interview Player | Learning Hub">
  <meta id="twitter-description" name="twitter:description" content="Tek tek sorularla interview pratigi.">
  <meta name="twitter:image" content="https://sadikcihanayaz.github.io/images/cihan.jpeg">
  <link rel="stylesheet" href="/app/app.css">
  <script id="seo-schema" type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Interview Player",
      "url": "https://sadikcihanayaz.github.io/interview.html",
      "description": "Tek tek sorularla interview pratigi."
    }
  </script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <button id="savedListOpenBtn" type="button" class="brand brand-btn">Listem</button>
      <div class="header-search" id="globalSearch">
        <label class="sr-only" for="globalSearchInput">Icerikte Ara</label>
        <input
          id="globalSearchInput"
          class="search-input"
          type="search"
          placeholder="Konu veya soru ara (min 4 karakter)"
          autocomplete="off"
          minlength="4"
          spellcheck="false"
        >
        <div id="globalSearchResults" class="search-results hidden" aria-live="polite"></div>
      </div>
      <a id="backToSub" href="/learn.html" class="btn">Geri</a>
    </div>
  </header>

  <main class="main">
    <div id="breadcrumb" class="breadcrumb"></div>
    <h1 id="title" class="title">Interview</h1>
    <p id="subtitle" class="subtitle"></p>

    <section id="questionShell" class="question-shell hidden">
      <div id="progress" class="progress"></div>
      <h2 id="questionTitle" class="question-title"></h2>
      <div class="question-row">
        <p id="questionText" class="question-text"></p>
        <button
          id="bookmarkQuestionBtn"
          type="button"
          class="star-bookmark-btn"
          aria-label="Listeye Ekle"
          title="Listeye Ekle"
          aria-pressed="false"
        ></button>
      </div>

      <div id="questionBody"></div>

      <div class="actions">
        <button id="checkBtn" class="btn">Yanitimi Kontrol Et</button>
        <button id="toggleAnswerBtn" class="btn">Cevabi Goster</button>
      </div>

      <div id="checkResult" class="article-block"></div>
      <div id="answerBox" class="answer-box hidden"></div>

      <div class="actions">
        <button id="prevBtn" class="btn">Onceki Soru</button>
        <button id="nextBtn" class="btn btn-primary">Sonraki Soru</button>
      </div>
    </section>

    <section id="errorBox" class="callout hidden"></section>
  </main>

  <div id="savedListModal" class="saved-list-modal hidden" aria-hidden="true">
    <div class="saved-list-backdrop" data-close-saved-list></div>
    <section class="saved-list-panel" role="dialog" aria-modal="true" aria-labelledby="savedListTitle">
      <div class="saved-list-header">
        <h2 id="savedListTitle">Listem</h2>
        <button id="savedListCloseBtn" type="button" class="btn">Kapat</button>
      </div>
      <div id="savedListContent" class="saved-list-content"></div>
      <div class="actions saved-list-footer">
        <button id="savedListClearBtn" type="button" class="btn">Listeyi Temizle</button>
      </div>
    </section>
  </div>

  <script src="/js/search.js"></script>
  <script src="/js/saved-list.js"></script>
  <script src="/js/interview.js"></script>
</body>
</html>
